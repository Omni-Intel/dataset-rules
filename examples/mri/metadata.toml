spec_version = "0.1.0"

[dataset]
dataset_id = "ds-adni-mri"
name = "ADNI Structural MRI Dataset"
modality = "mri"
version = "2026.05.20"
created_at = "2026-05-20T10:00:00+08:00"
updated_at = "2026-05-20T10:00:00+08:00"
sample_unit = "image"
task_type = "classification"
n_samples = 5000
n_subjects = 1200

[storage]
table_name = "dataset.lance"
lance_path = "dataset.lance"
path_type = "relative"
root_path = "."
backend = "local"
uri = ""

[schema]
primary_key = "sample_id"
data_column = "data"
label_column = "label"

[[schema.columns]]
name = "sample_id"
type = "string"
required = true
nullable = false
description = "Unique sample identifier."

[[schema.columns]]
name = "subject_id"
type = "string"
required = true
nullable = false
description = "Subject identifier."

[[schema.columns]]
name = "modality"
type = "string"
required = true
nullable = false
allowed_values = ["mri"]
description = "Data modality."

[[schema.columns]]
name = "data"
type = "fixed_size_list<float32>"
required = true
nullable = false
description = "Flattened padded MRI image."

[[schema.columns]]
name = "shape"
type = "list<int32>"
required = true
nullable = false
description = "Padded MRI shape."

[[schema.columns]]
name = "original_shape"
type = "list<int32>"
required = true
nullable = false
description = "Original MRI shape before padding."

[[schema.columns]]
name = "valid_length"
type = "int64"
required = true
nullable = false
description = "Valid flattened length before padding."

[[schema.columns]]
name = "affine"
type = "fixed_size_list<float32>[16]"
required = false
nullable = true
description = "Flattened 4x4 affine matrix."

[[schema.columns]]
name = "label"
type = "int32"
required = true
nullable = false
description = "Primary label."

[[schema.columns]]
name = "label_name"
type = "string"
required = false
nullable = true
description = "Human-readable label."

[[schema.columns]]
name = "qc_pass"
type = "bool"
required = true
nullable = false
description = "Quality control flag."

[[schema.columns]]
name = "split"
type = "string"
required = false
nullable = true
allowed_values = ["train", "val", "test"]
description = "Dataset split."

[data]
array_column = "data"
dtype = "float32"
axis_order = ["x", "y", "z"]
padding = true
padding_value = 0.0
shape_column = "shape"
original_shape_column = "original_shape"
valid_length_column = "valid_length"

[mri]
image_type = "T1w"
field_strength = 3.0
field_strength_unit = "T"
manufacturer = "Siemens"
scanner_model = "Prisma"
voxel_size = [1.0, 1.0, 1.0]
voxel_size_unit = "mm"
orientation = "RAS"
space = "native"
spatial_axes = ["x", "y", "z"]
affine_column = "affine"
sequence_name = "MPRAGE"
repetition_time = 2300.0
echo_time = 2.98
inversion_time = 900.0
flip_angle = 9.0
slice_thickness = 1.0
spacing_between_slices = 1.0
phase_encoding_direction = "unknown"
skull_stripped = false
bias_corrected = false
normalized = false

[label]
label_column = "label"
label_name_column = "label_name"
task_type = "classification"
num_classes = 2

[[label.classes]]
id = 0
name = "control"
description = "Healthy control."

[[label.classes]]
id = 1
name = "patient"
description = "Patient group."

[quality_control]
qc_column = "qc_pass"
qc_pass_values = [true, false]

[split]
split_column = "split"
allowed_values = ["train", "val", "test"]
