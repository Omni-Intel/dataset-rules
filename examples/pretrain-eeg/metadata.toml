spec_version = "0.1.0"

[dataset]
dataset_id = "ds-eeg-pretrain-example"
name = "EEG Pretraining Example"
modality = "eeg"
version = "2026.05.30"
created_at = "2026-05-30T00:00:00+00:00"
updated_at = "2026-05-30T00:00:00+00:00"
sample_unit = "window"
task_type = "pretraining"
n_samples = 9412029
n_subjects = 15005

[storage]
table_name = "__partitioned__"
lance_path = "__partitioned__"
path_type = "relative"
root_path = "."
backend = "local"
uri = ""

[schema]
primary_key = ["table_id", "sample_id"]
data_column = "data"

[[schema.columns]]
name = "sample_id"
type = "string"
required = true
nullable = false
description = "Stable sample identifier unique within table_id for partitioned pretraining datasets."

[[schema.columns]]
name = "table_id"
type = "string"
required = true
nullable = false
description = "Physical signal table identifier matching [[pretrain.tables]].table_id."

[[schema.columns]]
name = "sample_uid"
type = "string"
required = false
nullable = true
description = "Optional globally unique sample key derived from table_id and sample_id."

[[schema.columns]]
name = "source_sample_id"
type = "int64"
required = false
nullable = true
description = "Source-local sample identifier, if available."

[[schema.columns]]
name = "subject_id"
type = "string"
required = true
nullable = false
description = "Source-scoped subject identifier."

[[schema.columns]]
name = "subject_uid"
type = "string"
required = false
nullable = true
description = "Stable subject identifier scoped across source datasets."

[[schema.columns]]
name = "modality"
type = "string"
required = true
nullable = false
allowed_values = ["eeg"]
description = "Data modality."

[[schema.columns]]
name = "data"
type = "fixed_size_list<float32>"
required = true
nullable = false
description = "Flattened padded EEG signal."

[[schema.columns]]
name = "shape"
type = "list<int32>"
required = true
nullable = false
description = "Padded signal shape."

[[schema.columns]]
name = "original_shape"
type = "list<int32>"
required = true
nullable = false
description = "Original signal shape before padding."

[[schema.columns]]
name = "valid_length"
type = "int64"
required = true
nullable = false
description = "Valid flattened signal length before padding."

[[schema.columns]]
name = "qc_pass"
type = "bool"
required = true
nullable = false
description = "Quality control flag."

[[schema.columns]]
name = "source_dataset_id"
type = "string"
required = true
nullable = false
description = "Source dataset identifier."

[[schema.columns]]
name = "recording_id"
type = "string"
required = true
nullable = false
description = "Stable recording identifier within the source dataset."

[[schema.columns]]
name = "source_path"
type = "string"
required = true
nullable = false
description = "Relative source file path or source URI."

[[schema.columns]]
name = "start_time"
type = "float64"
required = true
nullable = false
unit = "s"
description = "Window start time in seconds."

[[schema.columns]]
name = "duration"
type = "float64"
required = true
nullable = false
unit = "s"
description = "Window duration in seconds."

[[schema.columns]]
name = "split"
type = "string"
required = true
nullable = false
allowed_values = ["train", "val", "test"]
description = "Pretraining split."

[[schema.columns]]
name = "preprocess_version"
type = "string"
required = true
nullable = false
description = "Preprocessing pipeline version."

[[schema.columns]]
name = "channel_profile"
type = "string"
required = true
nullable = false
description = "Channel profile identifier."

[[schema.columns]]
name = "channel_names"
type = "list<string>"
required = true
nullable = false
description = "Channel names aligned with the restored EEG channel axis."

[[schema.columns]]
name = "channel_mask"
type = "list<bool>"
required = true
nullable = false
description = "Mask over the channel profile slots."

[[schema.columns]]
name = "electrode_ids"
type = "fixed_size_list<uint16>"
required = false
nullable = true
description = "Channel slot electrode identifiers."

[[schema.columns]]
name = "bad_channel_mask"
type = "fixed_size_list<bool>"
required = false
nullable = true
description = "Bad-channel mask aligned with channel slots."

[[schema.columns]]
name = "sample_weight"
type = "float32"
required = false
nullable = true
description = "Optional sampler weight used when referenced by pretraining sampling metadata."

[data]
array_column = "data"
dtype = "float32"
axis_order = ["channel", "time"]
padding = true
padding_value = 0.0
shape_column = "shape"
original_shape_column = "original_shape"
valid_length_column = "valid_length"

[eeg]
n_channels = 136
sampling_rate = 200.0
sampling_rate_unit = "Hz"
unit = "normalized_uV"
reference = "mixed_declared_by_source"
montage = "mixed_declared_by_source"
channel_axis = 0
time_axis = 1
channel_layout = "per_sample"
channel_names_column = "channel_names"
channel_mask_column = "channel_mask"
line_frequency = 60.0
highpass = 0.3
lowpass = 75.0
window_length = 10.0
window_length_unit = "s"
overlap = 0.0
overlap_unit = "s"

[quality_control]
qc_column = "qc_pass"
qc_pass_values = [true, false]
qc_method = "pretraining-window-signal-and-channel-qc"

[split]
split_column = "split"
allowed_values = ["train", "val", "test"]

[pretrain]
pretrain_type = "self_supervised"
objective_family = "masked_prediction"
sample_id_scope = "table_local"
sample_key_columns = ["table_id", "sample_id"]
sample_uid_column = "sample_uid"
source_dataset_column = "source_dataset_id"
recording_id_column = "recording_id"
preprocess_version = "eeg_pretrain_200hz_10s_clip_divide_200_v1"
split_policy = "recording_disjoint"
sampling_policy = "balanced_by_source"
feature_view_ids = ["npd_v1"]

[pretrain.sampling]
policy = "balanced_by_source"
source_weighting = "temperature"
temperature = 0.5
weight_column = "sample_weight"

[[pretrain.sources]]
source_dataset_id = "tuh"
source_family = "tuh"
version = "snapshot-2026.05.29"
license = "restricted"
access_level = "registered"
n_samples = 9226714
n_subjects = 14975

[[pretrain.sources]]
source_dataset_id = "ds004395"
source_family = "openneuro"
version = "snapshot-2026.05.29"
license = "unknown"
access_level = "open"
n_samples = 185315
n_subjects = 30

[[pretrain.channel_profiles]]
profile_id = "tuh_named26"
n_channels = 26
layout = "fixed_slot"
channel_mask_column = "channel_mask"
electrode_id_column = "electrode_ids"

[[pretrain.channel_profiles]]
profile_id = "openneuro_slot136"
n_channels = 136
layout = "fixed_slot"
channel_mask_column = "channel_mask"
electrode_id_column = "electrode_ids"

[[pretrain.tables]]
table_id = "tuh_train"
role = "signal"
lance_path = "tables/signal/tuh_train.lance"
split = "train"
source_family = "tuh"
source_dataset_id = "tuh"
channel_profile = "tuh_named26"
n_samples = 9226714

[[pretrain.tables]]
table_id = "ds004395_slot136_train"
role = "signal"
lance_path = "tables/signal/openneuro_ds004395_slot136_train.lance"
split = "train"
source_family = "openneuro"
source_dataset_id = "ds004395"
channel_profile = "openneuro_slot136"
n_samples = 185315

[[pretrain.feature_views]]
view_id = "npd_v1"
feature_type = "handcrafted_descriptor"
derived_from = "signal"
feature_version = "2026.05.29"
alignment = "sample_id"
required_for_training = false

[[pretrain.tables]]
table_id = "ds004395_slot136_train_npd_v1"
role = "feature"
view_id = "npd_v1"
lance_path = "tables/features/npd_v1/openneuro_ds004395_slot136_train.lance"
aligned_to = "ds004395_slot136_train"
alignment = "sample_id"
n_samples = 185315
