spec_version = "0.1.0"

[dataset]
dataset_id = "ds-hmc-eeg"
name = "HMC Sleep EEG Dataset"
modality = "eeg"
version = "2026.05.21"
created_at = "2026-05-20T10:00:00+08:00"
updated_at = "2026-05-21T10:00:00+08:00"
sample_unit = "window"
task_type = "classification"
n_samples = 111890
n_subjects = 100

[storage]
table_name = "dataset.lance"
lance_path = "dataset.lance"
path_type = "relative"
root_path = "."
backend = "local"
uri = ""

[schema]
primary_key = "sample_id"
data_column = "data"
label_column = "label"

[[schema.columns]]
name = "sample_id"
type = "string"
required = true
nullable = false
description = "Unique sample identifier."

[[schema.columns]]
name = "subject_id"
type = "string"
required = true
nullable = false
description = "Subject identifier."

[[schema.columns]]
name = "session_id"
type = "string"
required = false
nullable = true
description = "Session identifier."

[[schema.columns]]
name = "run_id"
type = "string"
required = false
nullable = true
description = "Run identifier."

[[schema.columns]]
name = "modality"
type = "string"
required = true
nullable = false
allowed_values = ["eeg"]
description = "Data modality."

[[schema.columns]]
name = "data"
type = "fixed_size_list<float32>"
required = true
nullable = false
description = "Flattened padded EEG data."

[[schema.columns]]
name = "shape"
type = "list<int32>"
required = true
nullable = false
description = "Padded EEG shape."

[[schema.columns]]
name = "original_shape"
type = "list<int32>"
required = true
nullable = false
description = "Original EEG shape before padding."

[[schema.columns]]
name = "valid_length"
type = "int64"
required = true
nullable = false
description = "Valid flattened length before padding."

[[schema.columns]]
name = "label"
type = "int32"
required = true
nullable = false
description = "Sleep stage label."

[[schema.columns]]
name = "label_name"
type = "string"
required = false
nullable = true
description = "Human-readable sleep stage label."

[[schema.columns]]
name = "qc_pass"
type = "bool"
required = true
nullable = false
description = "Quality control flag."

[[schema.columns]]
name = "split"
type = "string"
required = false
nullable = true
allowed_values = ["train", "val", "test"]
description = "Dataset split."

[[schema.columns]]
name = "channel_names"
type = "list<string>"
required = true
nullable = false
description = "Channel names in the order used by the restored EEG channel axis."

[[schema.columns]]
name = "channel_status"
type = "list<string>"
required = false
nullable = true
allowed_values = ["good", "bad", "missing", "interpolated", "padded", "unknown"]
description = "Per-channel status aligned with channel_names."

[[schema.columns]]
name = "channel_mask"
type = "list<bool>"
required = false
nullable = true
description = "Mask over the dataset-level EEG channel list."

[data]
array_column = "data"
dtype = "float32"
axis_order = ["channel", "time"]
padding = true
padding_value = 0.0
shape_column = "shape"
original_shape_column = "original_shape"
valid_length_column = "valid_length"

[eeg]
n_channels = 4
sampling_rate = 256.0
sampling_rate_unit = "Hz"
unit = "uV"
reference = "linked_mastoids"
montage = "10-20"
channel_axis = 0
time_axis = 1
channel_layout = "per_subject"
channel_names_column = "channel_names"
channel_status_column = "channel_status"
channel_mask_column = "channel_mask"
line_frequency = 50.0
highpass = 0.5
lowpass = 45.0
window_length = 30.0
window_length_unit = "s"
overlap = 0.0
overlap_unit = "s"

[[eeg.channels]]
index = 0
name = "C3"
type = "eeg"
unit = "uV"
status = "good"

[[eeg.channels]]
index = 1
name = "C4"
type = "eeg"
unit = "uV"
status = "good"

[[eeg.channels]]
index = 2
name = "EOG"
type = "eog"
unit = "uV"
status = "good"

[[eeg.channels]]
index = 3
name = "EMG"
type = "emg"
unit = "uV"
status = "good"

[label]
label_column = "label"
label_name_column = "label_name"
task_type = "classification"
num_classes = 5

[[label.classes]]
id = 0
name = "W"
description = "Wake."

[[label.classes]]
id = 1
name = "N1"
description = "Non-REM stage 1."

[[label.classes]]
id = 2
name = "N2"
description = "Non-REM stage 2."

[[label.classes]]
id = 3
name = "N3"
description = "Non-REM stage 3."

[[label.classes]]
id = 4
name = "REM"
description = "Rapid eye movement sleep."

[quality_control]
qc_column = "qc_pass"
qc_pass_values = [true, false]

[split]
split_column = "split"
allowed_values = ["train", "val", "test"]
